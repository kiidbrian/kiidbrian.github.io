baseurl: "" # The subpath of your site. Use "" if you're hosting a blog at the root level.
url: "kiidbrian.github.io" # the base hostname & protocol for your site.
title: "kiidbrian"


paginate: 3 #articles per page
paginate_path: /blog/page:num #makes pagination working


#contacts
git: "https://github.com/kiidbrian"  #Add your github url here.
twitter: "https://twitter.com/kiid_brian"  #Add your twitter url here.
#stackoverflow: "http://stackoverflow.com/users/1231365/railsr" #Add your stackoverflow url here.


gems:
  - jekyll-sitemap

# This is used by feed.xml. Uncomment if you want to use it.
# description: "..."

exclude:
  - "README.md"
  - "CHANGELOG.md"
  - "Gemfile"
  - "Gemfile.lock"
permalink: :title
defaults:
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
